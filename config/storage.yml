test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

# Hijack the "local" environment service with our S3 config 
# to avoid editing initializers or production.rb
local:
  service: S3
  access_key_id: <%= ENV.fetch("B2_APPLICATION_KEY_ID") %>
  secret_access_key: <%= ENV.fetch("B2_APPLICATION_KEY") %>
  region: <%= ENV.fetch("B2_REGION", "us-east-001") %>
  bucket: <%= ENV.fetch("B2_BUCKET") %>
  endpoint: <%= ENV.fetch("B2_ENDPOINT") %>
  force_path_style: true
